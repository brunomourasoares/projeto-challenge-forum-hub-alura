# Production database configuration
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# Hibernate configuration
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.connection.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}
spring.jpa.properties.hibernate.connection.username=${MYSQL_USER}
spring.jpa.properties.hibernate.connection.password=${MYSQL_PASSWORD}

# Connection pool settings
spring.datasource.hikari.pool-name=ProdHikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=300000
spring.datasource.hikari.validation-timeout=5000


# JWT secret for production
jwt.secret=${JWT_SECRET}