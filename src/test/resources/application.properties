# Propriedades usadas apenas em testes
# Desabilita o Flyway para evitar erros com SQL específico de MySQL em H2
spring.flyway.enabled=false
# Usa h2 in-memory para testes
spring.datasource.url=jdbc:h2:mem:forumhub;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Faz o Hibernate criar o esquema automaticamente se necessário
spring.jpa.hibernate.ddl-auto=update

